<div class="auth-container">
  <div class="card auth-card">
    <div class="auth-header">
      <h2>Create an Account</h2>
      <p>Join TaskHub to manage your work.</p>
    </div>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="form-layout">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" class="form-control" placeholder="name@company.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" class="form-control" placeholder="••••••••" />
        
        @if (registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched) {
          <small class="error-text">Passwords do not match.</small>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="registerForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Creating account...' : 'Sign Up' }}
      </button>

      @if (errorMessage) {
        <div class="alert alert-error">{{ errorMessage }}</div>
      }
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in here</a></p>
    </div>
  </div>
</div>
