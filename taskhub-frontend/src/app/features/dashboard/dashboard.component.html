<div class="dashboard-container">
  
  <header class="dashboard-header">
    <h1>My Tasks</h1>
    <button class="btn btn-accent" (click)="logout()">Log Out</button>
  </header>

  <div class="card add-task-card">
    <form [formGroup]="taskForm" (ngSubmit)="addTask()" class="form-layout" style="flex-direction: row; align-items: flex-start;">
      
      <div class="form-group" style="flex: 1;">
        <label for="title">New Task</label>
        <input id="title" type="text" formControlName="title" class="form-control" placeholder="What needs to be done?" />
      </div>

      <div class="form-group" style="flex: 1;">
        <label for="description">Details (Optional)</label>
        <input id="description" type="text" formControlName="description" class="form-control" placeholder="Add some context..." />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid" style="margin-top: 1.75rem;">
        Add Task
      </button>

    </form>
  </div>

  <div class="task-list">
    
    @if (isLoading) {
      <app-loading-spinner></app-loading-spinner>
    } @else {
      
      @for (task of tasks; track task.id) {
        
        @if (editingTaskId !== task.id) {
          <div class="card task-item" [class.completed]="task.isCompleted">
            
            <input 
              type="checkbox" 
              class="task-checkbox"
              [checked]="task.isCompleted" 
              (change)="toggleCompletion(task)"
            />
            
            <div class="task-content">
              <h3>{{ task.title }}</h3>
              @if (task.description) {
                <p>{{ task.description }}</p>
              }
            </div>

            <div class="task-actions">
              <button class="btn edit-btn" (click)="startEditing(task)">Edit</button>
              <button class="btn delete-btn" (click)="deleteTask(task.id)">Delete</button>
            </div>
          </div>
        } 
        
        @else {
          <div class="card task-item edit-mode">
            <form [formGroup]="editTaskForm" (ngSubmit)="saveEdit(task)" class="edit-form-layout">
              
              <div class="edit-inputs">
                <input type="text" formControlName="title" class="form-control" placeholder="Task title" />
                <input type="text" formControlName="description" class="form-control" placeholder="Task details (optional)" />
              </div>

              <div class="task-actions">
                <button type="button" class="btn cancel-btn" (click)="cancelEdit()">Cancel</button>
                <button type="submit" class="btn save-btn" [disabled]="editTaskForm.invalid">Save</button>
              </div>

            </form>
          </div>
        }

      } @empty {
        
        <div class="empty-state">
          <h3>You're all caught up!</h3>
          <p>No tasks yet. Create one above to get started.</p>
        </div>
        
      }
      
    }

  </div>
</div>
